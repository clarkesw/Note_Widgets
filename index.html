<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StepViz Widgets</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    max-width: 680px;
    margin: 32px auto;
    padding: 0 16px;
    color: #1a1a1a;
    background: #ffffff;
  }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  p.sub { font-size: 14px; color: #6b7280; margin-top: 0; }

  #list-status {
    font-size: 13px;
    color: #6b7280;
    margin: 20px 0;
  }
  #list-status.error { color: #c53030; }

  ul.widget-list {
    list-style: none;
    padding: 0;
    margin: 20px 0 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  ul.widget-list li {
    border: 1px solid #e5e7eb;
    background: #f7f8fa;
    border-radius: 10px;
    padding: 12px 16px;
    transition: border-color 0.15s ease;
  }
  ul.widget-list li:hover { border-color: #bbb; }
  ul.widget-list a {
    font-size: 15px;
    font-weight: 500;
    color: #2b6cb0;
    text-decoration: none;
  }
  ul.widget-list a:hover { text-decoration: underline; }
  ul.widget-list .filename {
    display: block;
    margin-top: 2px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
    color: #9aa1ad;
  }

  footer {
    margin-top: 32px;
    font-size: 12px;
    color: #9aa1ad;
  }
</style>
</head>
<body>

<h1>StepViz Widgets</h1>
<p class="sub">Interactive step-through explainers for CS concepts.</p>

<div id="list-status">Loading widget list&hellip;</div>
<ul class="widget-list" id="widget-list"></ul>

<footer id="footer-note"></footer>

<script>
  // ---- CONFIG: fill these in for your repo ----
  const OWNER  = "clarkesw";
  const REPO   = "Note_Widgets";
  const BRANCH = "main";
  const PATH   = "";   // widgets live at repo root
  // -----------------------------------------------

  const statusEl = document.getElementById("list-status");
  const listEl = document.getElementById("widget-list");
  const footerEl = document.getElementById("footer-note");

  function titleFromFilename(name) {
    return name
      .replace(/\.html?$/i, "")
      .replace(/[_-]+/g, " ")
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  async function loadWidgets() {
    if (OWNER.startsWith("YOUR-") || REPO.startsWith("YOUR-")) {
      statusEl.textContent = "Set OWNER and REPO at the top of the <script> tag in index.html, then reload.";
      statusEl.classList.add("error");
      return;
    }

    const apiPath = PATH ? `${PATH}` : "";
    const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${apiPath}?ref=${BRANCH}`;

    try {
      const res = await fetch(url, {
        headers: { Accept: "application/vnd.github+json" }
      });

      if (!res.ok) {
        if (res.status === 403) {
          statusEl.textContent = "GitHub API rate limit reached — try again in a bit.";
        } else if (res.status === 404) {
          statusEl.textContent = `Couldn't find ${OWNER}/${REPO} (path "${PATH || "/"}", branch "${BRANCH}"). Check the config values.`;
        } else {
          statusEl.textContent = `GitHub API error (${res.status}).`;
        }
        statusEl.classList.add("error");
        return;
      }

      const entries = await res.json();

      const widgets = entries
        .filter(e => e.type === "file")
        .filter(e => /\.html?$/i.test(e.name))
        .filter(e => e.name.toLowerCase() !== "index.html")
        .sort((a, b) => a.name.localeCompare(b.name));

      if (widgets.length === 0) {
        statusEl.textContent = "No widgets found in this directory yet.";
        return;
      }

      statusEl.remove();

      widgets.forEach(w => {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.href = w.name;
        a.textContent = titleFromFilename(w.name);
        const filename = document.createElement("span");
        filename.className = "filename";
        filename.textContent = w.name;
        li.appendChild(a);
        li.appendChild(filename);
        listEl.appendChild(li);
      });

      footerEl.textContent = `${widgets.length} widget${widgets.length === 1 ? "" : "s"} · refreshed on load from ${OWNER}/${REPO}`;

    } catch (err) {
      statusEl.textContent = "Couldn't reach the GitHub API. Check your connection and try again.";
      statusEl.classList.add("error");
    }
  }

  loadWidgets();
</script>

</body>
</html>
